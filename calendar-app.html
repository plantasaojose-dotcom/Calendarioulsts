<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronos — Calendário & Tarefas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface2: #f0f1f4;
    --surface3: #e8e9ee;
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.13);
    --text: #1a1b2e;
    --text-muted: rgba(26,27,46,0.42);
    --text-soft: rgba(26,27,46,0.65);
    --accent: #5b4ef5;
    --accent-light: #ece9ff;
    --accent2: #7c6af7;
    --accent-glow: rgba(91,78,245,0.15);
    --green: #16a34a;
    --green-bg: #dcfce7;
    --amber: #d97706;
    --amber-bg: #fef3c7;
    --red: #dc2626;
    --red-bg: #fee2e2;
    --blue: #2563eb;
    --blue-bg: #dbeafe;
    --r: 14px;
    --r2: 10px;
    --sidebar-w: 68px;
    --sidebar-transition: 0.28s cubic-bezier(.4,0,.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ── APP SHELL ── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0 20px;
    gap: 4px;
    flex-shrink: 0;
    transition: width var(--sidebar-transition), opacity var(--sidebar-transition);
    overflow: hidden;
    z-index: 20;
    position: relative;
  }

  .sidebar.hidden {
    width: 0;
    border-right: none;
    opacity: 0;
    pointer-events: none;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1px;
    margin-bottom: 20px;
    cursor: default;
    line-height: 1;
    white-space: nowrap;
  }

  .nav-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
    transition: all 0.18s;
    position: relative;
    white-space: nowrap;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text-soft); }
  .nav-btn.active { background: var(--accent-light); color: var(--accent); }
  .nav-btn.active::after {
    content: '';
    position: absolute;
    left: -1px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 22px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
  }

  /* Sidebar toggle button — always visible */
  .toggle-btn {
    position: fixed;
    top: 16px;
    left: 14px;
    z-index: 30;
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text-soft);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: all 0.18s;
  }
  .toggle-btn:hover { background: var(--surface2); color: var(--text); }

  /* ── MAIN ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .view.active { display: flex; }

  /* ── VIEW HEADER ── */
  .view-header {
    padding: 16px 24px 14px 64px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .sidebar.hidden ~ .main .view-header { padding-left: 60px; }

  .view-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: var(--text);
  }

  .view-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.18s;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 16px var(--accent-glow); }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text-soft);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--surface3); color: var(--text); }

  /* ═══════════════════════════════
     CALENDAR VIEW
  ═══════════════════════════════ */
  #view-calendar {
    background: var(--bg);
  }

  .cal-layout {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0;
  }

  .cal-nav {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 24px 10px;
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .month-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
    min-width: 180px;
  }

  .cal-nav-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text-soft);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    transition: all 0.14s;
  }
  .cal-nav-btn:hover { background: var(--surface3); color: var(--text); }

  .today-btn {
    padding: 5px 13px;
    font-size: 12px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text-soft);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.14s;
  }
  .today-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

  /* Calendar grid section */
  .cal-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 10px 16px 8px;
    min-height: 0;
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
    flex-shrink: 0;
  }

  .cal-weekday {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 4px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 1fr;
    gap: 4px;
    flex: 1;
    min-height: 0;
  }

  .cal-day {
    background: var(--surface);
    border-radius: 10px;
    padding: 6px 7px 4px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.14s;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
    min-height: 0;
  }
  .cal-day:hover { background: #eef0ff; border-color: rgba(91,78,245,0.2); }
  .cal-day.other-month { background: transparent; opacity: 0.35; }
  .cal-day.today { border-color: var(--accent) !important; }
  .cal-day.today .day-num {
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
  }
  .cal-day.selected { border-color: var(--accent2); background: var(--accent-light); }

  .day-num {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-soft);
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border-radius: 6px;
  }

  .day-events { display: flex; flex-direction: column; gap: 2px; flex: 1; overflow: hidden; }

  .day-event-pill {
    font-size: 9px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
    line-height: 1.6;
  }

  /* Events panel */
  .events-panel {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 10px 16px 12px;
    flex-shrink: 0;
    max-height: 175px;
    overflow-y: auto;
  }

  .events-panel-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .events-list { display: flex; flex-direction: column; gap: 5px; }

  .event-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 9px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.14s;
  }
  .event-row:hover { background: var(--surface3); border-color: var(--border2); }

  .event-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .event-row-info { flex: 1; min-width: 0; }

  .event-row-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-row-meta { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  .event-row-date {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    white-space: nowrap;
    text-align: right;
  }

  .icon-btn {
    width: 26px; height: 26px;
    border-radius: 7px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: all 0.14s;
  }
  .icon-btn:hover { background: var(--red-bg); color: var(--red); border-color: rgba(220,38,38,0.2); }

  /* ── DAY DETAIL PANEL ── */
  .day-panel-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 50;
    pointer-events: none;
  }
  .day-panel-overlay.open { display: block; pointer-events: auto; }

  .day-panel-backdrop {
    position: absolute; inset: 0;
    background: rgba(26,27,46,0.18);
    backdrop-filter: blur(2px);
  }

  .day-panel {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 320px;
    background: var(--surface);
    border-left: 1px solid var(--border2);
    box-shadow: -8px 0 32px rgba(26,27,46,0.12);
    display: flex; flex-direction: column;
    animation: slideIn 0.22s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  .day-panel-header {
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  }

  .day-panel-date {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .day-panel-weekday {
    font-size: 12px; color: var(--text-muted);
    margin-top: 3px; font-weight: 500;
  }

  .day-panel-close {
    width: 30px; height: 30px; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--surface2);
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
    transition: all 0.13s;
  }
  .day-panel-close:hover { background: var(--surface3); color: var(--text); }

  .day-panel-add {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px 12px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .day-panel-events {
    flex: 1; overflow-y: auto;
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }

  .dp-event-card {
    border-radius: 11px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.14s;
  }
  .dp-event-card:hover { box-shadow: 0 2px 12px rgba(26,27,46,0.09); }

  .dp-event-color-bar {
    height: 4px;
    width: 100%;
    flex-shrink: 0;
  }

  .dp-event-body { padding: 10px 12px 10px; }

  .dp-event-title {
    font-size: 13px; font-weight: 600;
    color: var(--text); margin-bottom: 5px;
    line-height: 1.3;
  }

  .dp-event-meta {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 7px;
  }

  .dp-meta-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px;
    background: var(--surface2); color: var(--text-muted);
  }

  .dp-event-desc {
    font-size: 11px; color: var(--text-muted);
    line-height: 1.5; margin-bottom: 8px;
  }

  .dp-event-actions {
    display: flex; gap: 6px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .dp-action-btn {
    flex: 1; padding: 5px 8px;
    border-radius: 7px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text-soft);
    font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.13s; display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .dp-action-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .dp-action-btn.danger:hover { background: var(--red-bg); color: var(--red); border-color: rgba(220,38,38,0.25); }

  .dp-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; gap: 8px; color: var(--text-muted); font-size: 13px; padding: 24px;
    text-align: center;
  }
  .dp-empty-icon { font-size: 28px; opacity: 0.5; }

  /* ═══════════════════════════════
     TASKS VIEW
  ═══════════════════════════════ */
  .tasks-layout {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0 20px 16px;
    background: var(--bg);
  }

  .task-controls {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 0;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 13px;
    border-radius: 8px;
    border: 1.5px solid var(--border2);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.14s;
  }
  .filter-btn:hover { color: var(--text-soft); border-color: var(--border2); background: var(--surface2); }
  .filter-btn.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

  .tasks-columns {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  .task-col {
    background: var(--surface);
    border-radius: var(--r);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .task-col-header {
    padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .task-col-label {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-soft);
  }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-por-iniciar { background: #94a3b8; }
  .dot-em-processo { background: var(--amber); }
  .dot-pendente    { background: var(--blue); }
  .dot-concluida   { background: var(--green); }

  .task-col-count {
    font-size: 11px; font-weight: 700;
    font-family: 'Syne', sans-serif;
    background: var(--surface2);
    color: var(--text-muted);
    padding: 2px 8px; border-radius: 20px;
  }

  .task-col-body {
    flex: 1; overflow-y: auto;
    padding: 8px;
    display: flex; flex-direction: column; gap: 7px;
  }

  .task-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 11px 12px;
    cursor: default;
    transition: all 0.14s;
  }
  .task-card:hover { background: var(--surface3); border-color: var(--border2); }

  .task-card-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 6px; color: var(--text); }

  .task-card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }

  .task-tag {
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px;
  }
  .tag-por-iniciar { background: #f1f5f9; color: #64748b; }
  .tag-em-processo { background: var(--amber-bg); color: var(--amber); }
  .tag-pendente    { background: var(--blue-bg); color: var(--blue); }
  .tag-concluida   { background: var(--green-bg); color: var(--green); }

  .task-date { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 3px; }

  .task-actions {
    display: flex; gap: 4px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .status-change-btn {
    flex: 1;
    padding: 5px 3px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.13s;
    text-align: center; line-height: 1.3;
  }
  .status-change-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

  .task-del {
    width: 26px; height: auto;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: all 0.13s;
  }
  .task-del:hover { background: var(--red-bg); color: var(--red); border-color: rgba(220,38,38,0.2); }

  .empty-col {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--text-muted); opacity: 0.6;
    padding: 16px; text-align: center;
  }

  /* Chart section */
  .chart-section {
    padding: 12px 0 0;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 28px;
    background: var(--surface);
    margin: 0 -20px;
    padding: 12px 20px;
  }

  .donut-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
  .donut-wrap svg { width: 72px; height: 72px; transform: rotate(-90deg); }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .donut-pct { font-size: 16px; font-weight: 800; font-family: 'Syne', sans-serif; color: var(--green); line-height: 1; }
  .donut-label { font-size: 7px; color: var(--text-muted); font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }

  .chart-stats { display: flex; flex-direction: column; gap: 5px; }
  .stat-row { display: flex; align-items: center; gap: 7px; font-size: 11px; }
  .stat-color { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
  .stat-name { color: var(--text-soft); flex: 1; min-width: 80px; }
  .stat-count { font-weight: 700; font-family: 'Syne', sans-serif; font-size: 12px; }

  .progress-wrap { flex: 1; min-width: 0; }
  .progress-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .progress-title { font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
  .progress-count { font-size: 12px; color: var(--text-soft); font-weight: 500; }
  .progress-bar-wrap { height: 7px; background: var(--surface2); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #34d399); border-radius: 20px; transition: width 0.6s ease; }

  .chart-total { text-align: right; flex-shrink: 0; }
  .chart-total-num { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--text); line-height: 1; }
  .chart-total-label { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

  /* ═══════════════════════════════
     MODAL
  ═══════════════════════════════ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,27,46,0.35);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 18px;
    padding: 26px;
    width: 430px; max-width: 95vw;
    box-shadow: 0 20px 60px rgba(26,27,46,0.18), 0 4px 16px rgba(26,27,46,0.08);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); }
  .modal-close {
    width: 30px; height: 30px; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--surface2);
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    transition: all 0.13s;
  }
  .modal-close:hover { color: var(--text); background: var(--surface3); }

  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; display: block;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: 9px;
    padding: 9px 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text);
    outline: none;
    transition: border-color 0.14s, box-shadow 0.14s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: #fff;
  }
  .form-textarea { resize: vertical; min-height: 72px; }
  .form-select { cursor: pointer; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .color-picker { display: flex; gap: 7px; flex-wrap: wrap; }
  .color-opt {
    width: 26px; height: 26px; border-radius: 7px;
    border: 2px solid transparent; cursor: pointer; transition: all 0.13s;
  }
  .color-opt:hover { transform: scale(1.1); }
  .color-opt.selected { border-color: var(--text); outline: 2px solid var(--bg); outline-offset: 1px; }

  .modal-footer {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  @media (max-width: 900px) {
    .tasks-columns { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 580px) {
    .tasks-columns { grid-template-columns: 1fr; }
    .view-header { padding-left: 56px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Main -->

    <!-- ═══ CALENDAR ═══ -->

            <div class="cal-weekday">Qua</div>
            <div class="cal-weekday">Qui</div>
            <div class="cal-weekday">Sex</div>

          <button class="filter-btn active" onclick="filterTasks('all',this)">Todas</button>
          <button class="filter-btn" onclick="filterTasks('por-iniciar',this)">Por iniciar</button>
          <button class="filter-btn" onclick="filterTasks('em-processo',this)">Em processo</button>

          <button class="filter-btn" onclick="filterTasks('concluida',this)">Concluída</button>
        </div>

        <div class="tasks-columns" id="tasks-columns"></div>

        <div class="chart-section">
          <div class="donut-wrap">
            <svg viewBox="0 0 72 72">
              <circle cx="36" cy="36" r="27" fill="none" stroke="#e8e9ee" stroke-width="9"/>
              <circle id="donut-progress" cx="36" cy="36" r="27" fill="none" stroke="#16a34a" stroke-width="9"
                stroke-dasharray="169.6" stroke-dashoffset="169.6" stroke-linecap="round"/>
            </svg>
            <div class="donut-center">
              <span class="donut-pct" id="donut-pct">0%</span>
              <span class="donut-label">feitas</span>
            </div>
          </div>

          <div class="chart-stats" id="chart-stats"></div>

          <div class="progress-wrap">
            <div class="progress-label-row">
              <span class="progress-title">Taxa de conclusão</span>
              <span class="progress-count" id="progress-label">0 / 0</span>
            </div>

              <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
            </div>
          </div>

          <div class="chart-total">

  </main>
</div>

<!-- DAY DETAIL PANEL -->
<div class="day-panel-overlay" id="day-panel-overlay">
  <div class="day-panel-backdrop" onclick="closeDayPanel()"></div>
  <div class="day-panel">
    <div class="day-panel-header">
      <div>
        <div class="day-panel-date" id="dp-date-label"></div>
        <div class="day-panel-weekday" id="dp-weekday-label"></div>
      </div>
      <button class="day-panel-close" onclick="closeDayPanel()">✕</button>
    </div>
    <div class="day-panel-add">
      <button class="btn btn-primary" style="font-size:12px; padding:6px 13px; flex:1;" onclick="openEventFromPanel()">＋ Novo evento neste dia</button>

    <div class="day-panel-events" id="dp-events-list"></div>

</div>

<!-- EVENT MODAL -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">

      <select class="form-select" id="ev-type">
        <option value="reuniao">🤝 Reunião</option>
        <option value="evento">🎉 Evento</option>
        <option value="lembrete">🔔 Lembrete</option>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-header">

        <label class="form-label">Estado</label>

          <option value="por-iniciar">Por iniciar</option>

          <option value="concluida">Concluída</option>

      <button class="btn btn-primary" onclick="saveTask()">Guardar</button>

<script>
// ── STATE ──
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let selectedDate = null;
let editingEventId = null;
let currentFilter = 'all';
let selectedColor = '#5b4ef5';
let sidebarVisible = true;
let panelDate = null;

let events = JSON.parse(localStorage.getItem('kronos_events') || '[]');
let tasks  = JSON.parse(localStorage.getItem('kronos_tasks')  || '[]');

const EVENT_COLORS = ['#5b4ef5','#ec4899','#3b82f6','#16a34a','#d97706','#dc2626','#0891b2','#7c3aed','#ea580c','#db2777'];
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const TYPE_ICONS = { reuniao:'🤝', evento:'🎉', lembrete:'🔔', prazo:'⏰', pessoal:'👤' };
const STATUS_INFO = {
  'por-iniciar': { label:'Por iniciar', dotClass:'dot-por-iniciar', tagClass:'tag-por-iniciar', color:'#94a3b8' },
  'em-processo': { label:'Em processo', dotClass:'dot-em-processo', tagClass:'tag-em-processo', color:'#d97706' },
  'pendente':    { label:'Pendente',    dotClass:'dot-pendente',    tagClass:'tag-pendente',    color:'#2563eb' },
  'concluida':   { label:'Concluída',   dotClass:'dot-concluida',   tagClass:'tag-concluida',   color:'#16a34a' },
};

function save() {
  localStorage.setItem('kronos_events', JSON.stringify(events));
  localStorage.setItem('kronos_tasks', JSON.stringify(tasks));
}

// ── SIDEBAR TOGGLE ──
function toggleSidebar() {
  sidebarVisible = !sidebarVisible;
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('toggle-btn');
  sb.classList.toggle('hidden', !sidebarVisible);
  btn.style.left = sidebarVisible ? '14px' : '14px';
  btn.title = sidebarVisible ? 'Ocultar menu' : 'Mostrar menu';
}

// ── VIEW SWITCH ──
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('nav-' + (view === 'calendar' ? 'cal' : 'tasks')).classList.add('active');
  if (view === 'tasks') renderTasks();
}

// ── CALENDAR ──
function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  document.getElementById('month-title').textContent = MONTHS_PT[currentMonth] + ' ' + currentYear;

  const first = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();
  const today = new Date();
  today.setHours(0,0,0,0);

  const monthEvs = events.filter(e => {
    const d = new Date(e.date + 'T00:00:00');
    return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
  });
  document.getElementById('month-event-count').textContent = monthEvs.length;

  let cells = [];
  for (let i = first - 1; i >= 0; i--) cells.push({ day: daysInPrev - i, other: true });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, other: false });
  while (cells.length % 7 !== 0) cells.push({ day: cells.length - (first + daysInMonth) + 1, other: true });

  grid.innerHTML = '';
  // Set grid rows explicitly
  const rows = cells.length / 7;
  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  cells.forEach(({ day, other }) => {
    const cell = document.createElement('div');
    cell.className = 'cal-day' + (other ? ' other-month' : '');
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

    const cellDate = new Date(currentYear, currentMonth, other ? -99 : day);
    if (!other) {
      const cellD = new Date(currentYear, currentMonth, day);
      if (cellD.getTime() === today.getTime()) cell.classList.add('today');
    }
    if (selectedDate === dateStr) cell.classList.add('selected');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = day;
    cell.appendChild(numEl);

    if (!other) {
      const dayEvs = events.filter(e => e.date === dateStr);
      if (dayEvs.length) {
        const wrap = document.createElement('div');
        wrap.className = 'day-events';
        dayEvs.slice(0, 3).forEach(ev => {
          const pill = document.createElement('div');
          pill.className = 'day-event-pill';
          pill.style.cssText = `background:${ev.color}18; color:${ev.color}; cursor:pointer;`;
          pill.textContent = (TYPE_ICONS[ev.type]||'') + ' ' + ev.title;
          pill.onclick = e => {
            e.stopPropagation();
            if (dayEvs.length > 1) { openDayPanel(dateStr); }
            else { editEvent(ev.id); }
          };
          wrap.appendChild(pill);
        });
        if (dayEvs.length > 3) {
          const more = document.createElement('div');
          more.className = 'day-event-pill';
          more.style.cssText = 'background:#ece9ff; color:#5b4ef5; cursor:pointer; font-weight:700;';
          more.textContent = `+${dayEvs.length - 3} mais`;
          more.onclick = e => { e.stopPropagation(); openDayPanel(dateStr); };
          wrap.appendChild(more);
        }
        cell.appendChild(wrap);
      }
    }

    cell.onclick = () => {
      selectedDate = dateStr;
      document.getElementById('ev-date').value = dateStr;
      const dayEvs = other ? [] : events.filter(e => e.date === dateStr);
      if (!other && dayEvs.length > 1) {
        openDayPanel(dateStr);
      } else {
        renderCalendar();
      }
    };
    cell.ondblclick = () => { selectedDate = dateStr; openEventModal(dateStr); };
    grid.appendChild(cell);
  });

  renderEventsList();

  const upcoming = events.filter(e => new Date(e.date + 'T00:00:00') >= today).length;
  document.getElementById('cal-header-sub').textContent = `${upcoming} evento${upcoming !== 1 ? 's' : ''} próximo${upcoming !== 1 ? 's' : ''}`;
}

function renderEventsList() {
  const list = document.getElementById('all-events-list');
  const sorted = [...events].sort((a,b) => {
    const da = a.date + (a.time || '00:00');
    const db = b.date + (b.time || '00:00');
    return da.localeCompare(db);
  });

  if (!sorted.length) {
    list.innerHTML = '<div style="font-size:12px; color:var(--text-muted); padding:8px 0;">Sem eventos. Duplo-clique num dia para criar.</div>';
    return;
  }

  const today = new Date(); today.setHours(0,0,0,0);
  list.innerHTML = sorted.map(ev => {
    const d = new Date(ev.date + 'T00:00:00');
    const isPast = d < today;
    const isToday = d.getTime() === today.getTime();
    return `
      <div class="event-row" onclick="editEvent('${ev.id}')" style="${isPast ? 'opacity:0.45;' : ''}">
        <div class="event-dot" style="background:${ev.color}"></div>
        <div class="event-row-info">
          <div class="event-row-title">${TYPE_ICONS[ev.type]||''} ${escHtml(ev.title)}</div>
          ${ev.desc ? `<div class="event-row-meta">${escHtml(ev.desc.substring(0,50))}${ev.desc.length > 50 ? '…' : ''}</div>` : ''}
        </div>
        <div class="event-row-date">
          ${isToday ? '<span style="color:var(--accent);font-weight:700">Hoje</span>' : d.toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'})}
          ${ev.time ? '<br><span style="color:var(--text-soft)">' + ev.time + '</span>' : ''}
        </div>
        <button class="icon-btn" onclick="event.stopPropagation(); deleteEvent('${ev.id}')">🗑</button>
      </div>`;
  }).join('');
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function goToday() {
  currentYear = new Date().getFullYear();
  currentMonth = new Date().getMonth();
  renderCalendar();
}

// ── DAY PANEL ──
const WEEKDAYS_PT = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];

function openDayPanel(dateStr) {
  panelDate = dateStr;
  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('dp-date-label').textContent =
    d.getDate() + ' de ' + MONTHS_PT[d.getMonth()] + ' ' + d.getFullYear();
  document.getElementById('dp-weekday-label').textContent = WEEKDAYS_PT[d.getDay()];
  renderDayPanel();
  document.getElementById('day-panel-overlay').classList.add('open');
}

function closeDayPanel() {
  document.getElementById('day-panel-overlay').classList.remove('open');
  panelDate = null;
}

function renderDayPanel() {
  const list = document.getElementById('dp-events-list');
  const dayEvs = events
    .filter(e => e.date === panelDate)
    .sort((a, b) => (a.time || '00:00').localeCompare(b.time || '00:00'));

  if (!dayEvs.length) {
    list.innerHTML = `<div class="dp-empty"><div class="dp-empty-icon">📭</div>Sem eventos neste dia.<br>Clica em "Novo evento" para criar.</div>`;
    return;
  }

  list.innerHTML = dayEvs.map(ev => `
    <div class="dp-event-card">
      <div class="dp-event-color-bar" style="background:${ev.color}"></div>
      <div class="dp-event-body">
        <div class="dp-event-title">${escHtml(ev.title)}</div>
        <div class="dp-event-meta">
          <span class="dp-meta-chip">${TYPE_ICONS[ev.type] || '📌'} ${ev.type.charAt(0).toUpperCase() + ev.type.slice(1)}</span>
          ${ev.time ? `<span class="dp-meta-chip">🕐 ${ev.time}</span>` : ''}
        </div>
        ${ev.desc ? `<div class="dp-event-desc">${escHtml(ev.desc)}</div>` : ''}
        <div class="dp-event-actions">
          <button class="dp-action-btn" onclick="editEventFromPanel('${ev.id}')">✏️ Editar</button>
          <button class="dp-action-btn danger" onclick="deleteEventFromPanel('${ev.id}')">🗑 Apagar</button>
        </div>
      </div>
    </div>
  `).join('');
}

function editEventFromPanel(id) {
  closeDayPanel();
  editEvent(id);
}

function deleteEventFromPanel(id) {
  events = events.filter(e => e.id !== id);
  save();
  renderCalendar();
  // Se ainda há eventos neste dia, mantém o painel aberto; caso contrário fecha
  if (events.filter(e => e.date === panelDate).length > 0) {
    renderDayPanel();
  } else {
    closeDayPanel();
  }
}

function openEventFromPanel() {
  const date = panelDate;
  closeDayPanel();
  openEventModal(date);
}

// ── EVENT MODAL ──
function buildColorPicker() {
  document.getElementById('event-color-picker').innerHTML = EVENT_COLORS.map(c =>
    `<div class="color-opt ${c === selectedColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}

function selectColor(c) { selectedColor = c; buildColorPicker(); }

function openEventModal(date) {
  editingEventId = null;
  document.getElementById('event-modal-title').textContent = 'Novo Evento';
  document.getElementById('ev-title').value = '';
  document.getElementById('ev-date').value = date || selectedDate || new Date().toISOString().split('T')[0];
  document.getElementById('ev-time').value = '';
  document.getElementById('ev-type').value = 'reuniao';
  document.getElementById('ev-desc').value = '';
  selectedColor = EVENT_COLORS[0];
  buildColorPicker();
  document.getElementById('event-modal').classList.add('open');
  setTimeout(() => document.getElementById('ev-title').focus(), 80);
}

function editEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  editingEventId = id;
  document.getElementById('event-modal-title').textContent = 'Editar Evento';
  document.getElementById('ev-title').value = ev.title;
  document.getElementById('ev-date').value = ev.date;
  document.getElementById('ev-time').value = ev.time || '';
  document.getElementById('ev-type').value = ev.type || 'reuniao';
  document.getElementById('ev-desc').value = ev.desc || '';
  selectedColor = ev.color;
  buildColorPicker();
  document.getElementById('event-modal').classList.add('open');
}

function closeEventModal() { document.getElementById('event-modal').classList.remove('open'); editingEventId = null; }

function saveEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const date = document.getElementById('ev-date').value;
  if (!title || !date) { document.getElementById('ev-title').style.borderColor = 'var(--red)'; return; }
  document.getElementById('ev-title').style.borderColor = '';

  const ev = {
    id: editingEventId || Date.now().toString(), title, date,
    time: document.getElementById('ev-time').value,
    type: document.getElementById('ev-type').value,
    desc: document.getElementById('ev-desc').value.trim(),
    color: selectedColor,
  };

  events = editingEventId ? events.map(e => e.id === editingEventId ? ev : e) : [...events, ev];
  save(); closeEventModal(); renderCalendar();
  // Se o painel do dia estiver aberto para este dia, actualiza
  if (panelDate && panelDate === ev.date) { openDayPanel(panelDate); }
}

function deleteEvent(id) { events = events.filter(e => e.id !== id); save(); renderCalendar(); }

// ── TASKS ──
function renderTasks() {
  const cols = document.getElementById('tasks-columns');
  const statuses = ['por-iniciar','em-processo','pendente','concluida'];
  const filtered = currentFilter === 'all' ? tasks : tasks.filter(t => t.status === currentFilter);

  cols.innerHTML = statuses.map(status => {
    const info = STATUS_INFO[status];
    const col = filtered.filter(t => t.status === status);
    return `
      <div class="task-col">
        <div class="task-col-header">
          <div class="task-col-label"><div class="status-dot ${info.dotClass}"></div>${info.label}</div>
          <div class="task-col-count">${col.length}</div>
        </div>
        <div class="task-col-body">
          ${col.length === 0 ? '<div class="empty-col">Sem tarefas</div>' : col.map(renderTaskCard).join('')}
        </div>
      </div>`;
  }).join('');

  renderChart();
}

function renderTaskCard(t) {
  const info = STATUS_INFO[t.status];
  const others = ['por-iniciar','em-processo','pendente','concluida'].filter(s => s !== t.status);
  const dueDateStr = t.dueDate ? new Date(t.dueDate + 'T00:00:00').toLocaleDateString('pt-PT',{day:'2-digit',month:'short'}) : '';
  const today = new Date(); today.setHours(0,0,0,0);
  const isOverdue = t.dueDate && new Date(t.dueDate + 'T00:00:00') < today && t.status !== 'concluida';

  return `
    <div class="task-card">
      <div class="task-card-title">${escHtml(t.title)}</div>
      ${t.desc ? `<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;line-height:1.4">${escHtml(t.desc.substring(0,80))}${t.desc.length>80?'…':''}</div>` : ''}
      <div class="task-card-meta">
        ${t.tag ? `<span class="task-tag ${info.tagClass}">${escHtml(t.tag)}</span>` : ''}
        ${dueDateStr ? `<span class="task-date" style="${isOverdue?'color:var(--red)':''}">📅 ${dueDateStr}</span>` : ''}
      </div>
      <div class="task-actions">
        ${others.map(s => `<button class="status-change-btn" onclick="changeTaskStatus('${t.id}','${s}')">${STATUS_INFO[s].label}</button>`).join('')}
        <button class="task-del" onclick="deleteTask('${t.id}')">🗑</button>
      </div>
    </div>`;
}

function changeTaskStatus(id, status) { tasks = tasks.map(t => t.id === id ? {...t, status} : t); save(); renderTasks(); }
function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); save(); renderTasks(); }

function filterTasks(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

function renderChart() {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'concluida').length;
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  const circ = 169.6;
  document.getElementById('donut-progress').style.strokeDashoffset = circ - (pct / 100) * circ;
  document.getElementById('donut-pct').textContent = pct + '%';
  document.getElementById('total-tasks').textContent = total;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${total} concluídas`;

  const colors = { 'por-iniciar':'#94a3b8', 'em-processo':'#d97706', 'pendente':'#2563eb', 'concluida':'#16a34a' };
  document.getElementById('chart-stats').innerHTML = ['por-iniciar','em-processo','pendente','concluida'].map(s => `
    <div class="stat-row">
      <div class="stat-color" style="background:${colors[s]}"></div>
      <span class="stat-name">${STATUS_INFO[s].label}</span>
      <span class="stat-count" style="color:${colors[s]}">${tasks.filter(t=>t.status===s).length}</span>
    </div>`).join('');
}

// ── TASK MODAL ──
function openTaskModal() {
  ['tk-title','tk-desc','tk-tag'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('tk-status').value = 'por-iniciar';
  document.getElementById('tk-date').value = '';
  document.getElementById('task-modal').classList.add('open');
  setTimeout(() => document.getElementById('tk-title').focus(), 80);
}

function closeTaskModal() { document.getElementById('task-modal').classList.remove('open'); }

function saveTask() {
  const title = document.getElementById('tk-title').value.trim();
  if (!title) { document.getElementById('tk-title').style.borderColor = 'var(--red)'; return; }
  document.getElementById('tk-title').style.borderColor = '';
  tasks.push({
    id: Date.now().toString(), title,
    desc: document.getElementById('tk-desc').value.trim(),
    status: document.getElementById('tk-status').value,
    dueDate: document.getElementById('tk-date').value,
    tag: document.getElementById('tk-tag').value.trim(),
  });
  save(); closeTaskModal(); renderTasks();
}

// ── UTILS ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('event-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeEventModal(); });
document.getElementById('task-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeTaskModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') { closeEventModal(); closeTaskModal(); closeDayPanel(); } });

// ── INIT ──
renderCalendar();
buildColorPicker();
</script>
</body>
</html>
